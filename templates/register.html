{% extends "form.html" %}
{% from "includes/users.html" import select_gender %}

{% block static_files %}
<script src="{{ url_for('static', filename='user-utils.js') }}"></script>
{% endblock %}

{% block title %}注册 - MathProbs{% endblock %}

{% block form %}
<form class="mathprobsform" enctype="multipart/form-data"
    data-nextpage="{{ next }}" id="registerForm"
    onsubmit="userRegister(); return false">
    <h3>注册</h3>
    <span>
        <label for="userName">用户名：</label>
        <input id="userName" name="username" type="text"
            spellcheck="false" placeholder="请输入用户名"
            autocomplete="username" required>
    </span>
    <span><label for="gender">性别：</label>{{ select_gender() }}</span>
    <span>
        <label for="password">密码：</label>
        <input id="password" name="password" type="password"
            spellcheck="false" placeholder="请输入密码"
            autocomplete="new-password" required>
    </span>
    <span>
        <label for="passwordConfirmation">确认：</label>
        <input id="passwordConfirmation" name="password_confirmation"
            type="password" spellcheck="false" placeholder="再次确认密码"
            autocomplete="new-password" required>
    </span>
    <span>
        <label for="avatar">头像：</label><br>
        <input id="avatar" name="avatar" type="file"
            formenctype="multipart/form-data" accept="image/*">
    </span>
    <span><button type="submit">注册</button></span>
</form>
{% endblock %}

{% block right_block %}
<h2>已有账号？</h2>
<p>直接登录</p>
<a href="{{ url_for('login', next=next) }}">
    <button class="register" type="button">登录</button>
</a>
{% endblock %}
