<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg', v=2) }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.svg', v=2) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='light-mode.css') }}" media="(prefers-color-scheme: light)">
    <link rel="stylesheet" href="{{ url_for('static', filename='dark-mode.css') }}" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="{{ url_for('static', filename='formstyle.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <script src="{{ url_for('static', filename='user-utils.js') }}"></script>
    {%- block static_files -%}{%- endblock -%}
</head>
<body>
    <main>
        <article class="left-content-wrap">{% block left_content %}{% endblock %}</article>
        <article class="right-content-wrap"><div>{% block right_content %}{% endblock %}</div></article>
    </main>
</body>
</html>
