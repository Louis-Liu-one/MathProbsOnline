{% extends "base.html" %}

{% block title %}帮助 - MathProbs{% endblock %}

{% block static_files %}
<script src="https://fastly.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/latex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/bnf.min.js"></script>
<script src="https://fastly.jsdelivr.net/npm/markdown-it-anchor@9.2.0/dist/markdownItAnchor.umd.min.js"></script>
<script src="https://fastly.jsdelivr.net/npm/markdown-it-toc-done-right@4.2.0/dist/markdownItTocDoneRight.umd.min.js"></script>
<script src="{{ url_for('static', filename='md-render.js') }}"></script>
{% endblock %}

{% block body %}
<div class="tocblock" id="tocBlock"><h3>目录</h3></div>
<div class="contentblock">
    <div class="markdown-body" id="bodyBlock">
        <textarea id="helpContentTextArea">[toc]
{% include filename -%}
        </textarea>
    </div>
</div>
<script>
    renderElement(bodyBlock, helpContentTextArea.value);
    const tocNavElement = bodyBlock.querySelector('nav.table-of-contents');
    if (tocNavElement) tocBlock.appendChild(tocNavElement);
    const firstH1 = bodyBlock.querySelector('h1');
    navbarTitleElement.innerHTML = `帮助 —— ${firstH1.innerHTML}`;
    firstH1.style.display = 'none';
</script>
{% endblock %}
