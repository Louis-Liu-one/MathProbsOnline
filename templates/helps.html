{% extends "base.html" %}

{% block title %}帮助 - MathProbs{% endblock %}

{% block styles %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/default.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/latex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-anchor@9.2.0/dist/markdownItAnchor.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-toc-done-right@4.2.0/dist/markdownItTocDoneRight.umd.min.js"></script>
<script src="{{ url_for('static', filename='md-render.js') }}"></script>
{% endblock %}

{% block body %}
<div class="tocblock" id="tocdiv"><h3>目录</h3></div>
<div class="contentblock">
    <div class="markdown-body" id="bodydiv">
        <textarea id="contentmd">[toc]
{% include filename -%}
        </textarea>
    </div>
</div>
<script>
    html = renderElement(bodydiv, contentmd.value);
    tocnav = bodydiv.querySelector('nav.table-of-contents');
    if (tocnav) tocdiv.appendChild(tocnav);
    firstH1 = bodydiv.querySelector('h1');
    navbar_title.innerHTML = '帮助：' + firstH1.innerHTML;
    firstH1.style.display = 'none';
</script>
{% endblock %}
